<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Library Management System</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>

        <div class="container">
            <h1>📚 Library Management System</h1>

            <!-- ADD BOOK -->
            <div class="card">
                <h2>Add Book</h2>
                <div class="input-group">
                    <input type="text" id="title" placeholder="Book Title">
                    <input type="text" id="author" placeholder="Author">
                    <input type="text" id="bookId" placeholder="Book ID">
                </div>
                <button id="addBookBtn">Add Book</button>
            </div>

            <!-- ISSUE BOOK -->
            <div class="card">
                <h2>Issue Book</h2>
                <div class="input-group">
                    <input type="text" id="issueId" placeholder="Book ID">
                    <input type="text" id="userName" placeholder="User Name">
                    <input type="date" id="dueDate">
                </div>
                <button id="issueBookBtn">Issue Book</button>
            </div>

            <!-- RETURN BOOK -->
            <div class="card">
                <h2>Return Book</h2>
                <div class="input-group">
                    <input type="text" id="returnId" placeholder="Book ID">
                </div>
                <button id="returnBookBtn">Return Book</button>
            </div>

            <!-- BOOK LIST -->
            <div class="card">
                <h2>Library Books</h2>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Title</th>
                                <th>Author</th>
                                <th>Status</th>
                                <th>Issued To</th>
                                <th>Due Date</th>
                            </tr>
                        </thead>
                        <tbody id="bookList">
                            <tr>
                                <td colspan="6">No books available</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>

        <script src="script.js"></script>
    </body>

</html>
