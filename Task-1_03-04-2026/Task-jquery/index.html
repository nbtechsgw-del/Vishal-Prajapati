<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Flip box</title>
        <link rel="stylesheet" href="./style.css">
    </head>

    <body>

        <div class="box">
            Flip Me!
        </div>

        <div class="buttons">
            <button onclick="flipLeft()">Flip Left</button>
            <button onclick="flipRight()">Flip Right</button>
            <button onclick="flipUp()">Flip Up</button>
            <button onclick="flipDown()">Flip Down</button>
            <button onclick="resetFlip()">Reset</button>
        </div>

        <script src="./script.js"></script>

    </body>

</html>
