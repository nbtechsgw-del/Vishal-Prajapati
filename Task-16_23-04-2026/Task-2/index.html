<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <title>Student Details</title>

        <style>
            body {
                font-family: Arial, sans-serif;
                background-color: #f5f5f5;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
            }

            .card {
                background: white;
                padding: 25px;

            }

            h2 {
                text-align: center;
                margin-bottom: 20px;
            }

            p {
                font-size: 18px;
                margin: 10px 0;
            }

            span {
                font-weight: bold;
                color: #333;
            }
        </style>
    </head>

    <body>

        <div class="card">
            <h2>Student Information</h2>

            <p><span>Name:</span> Sarthak Aleriya</p>
            <p><span>College Name:</span> Indore Institute of Science and Technology</p>
            <p><span>Semester:</span> 8</p>

        </div>

    </body>

</html>
