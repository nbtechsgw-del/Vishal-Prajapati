<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <title>JavaScript Assignment</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>

        <!-- Prime Number Generator -->
        <div class="container">
            <h2>Prime Number Generator</h2>
            <label for="start">Start:</label>
            <input type="number" id="start" min="0" value="1">

            <label for="end">End:</label>
            <input type="number" id="end" min="1" value="50">

            <label for="output">Prime Numbers:</label>
            <textarea id="output" readonly></textarea>

            <button onclick="generatePrimes()">Generate</button>
        </div>

        <!-- Mark-Sheet Calculator -->
        <div class="container">
            <h2>Mark-Sheet Calculator</h2>
            <label for="hindi">Hindi (Max: 100)</label>
            <input type="number" id="hindi" min="0" max="100">

            <label for="english">English (Max: 100)</label>
            <input type="number" id="english" min="0" max="100">

            <label for="maths">Maths (Max: 100)</label>
            <input type="number" id="maths" min="0" max="100">

            <label for="science">Science (Max: 100)</label>
            <input type="number" id="science" min="0" max="100">

            <label for="art">Art (Max: 100)</label>
            <input type="number" id="art" min="0" max="100">

            <label for="computer">Computer (Max: 100)</label>
            <input type="number" id="computer" min="0" max="100">

            <label for="total">Total</label>
            <input type="text" id="total" readonly>

            <label for="percentage">Percentage</label>
            <input type="text" id="percentage" readonly>

            <label for="grade">Grade</label>
            <input type="text" id="grade" readonly>

            <button onclick="calculateMarks()">Calculate</button>
        </div>

        <script src="./script.js"></script>
    </body>

</html>
