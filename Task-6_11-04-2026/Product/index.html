<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Product Listing Page</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
            rel="stylesheet">

        <link rel="stylesheet" href="./style.css">

    </head>

    <body>

        <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
            <div class="container">
        
                <a class="navbar-brand fw-bold" href="#">MyStore</a>
        
                <button class="navbar-toggler" type="button" disabled>
                    <span class="navbar-toggler-icon"></span>
                </button>
        
                <div class="collapse navbar-collapse" id="navbarContent">
        
                    <form class="d-flex mx-auto w-50">
                        <input class="form-control me-2" type="search" placeholder="Search products..." id="searchInput">
                    </form>
        
                    <div class="d-flex align-items-center">
                        <button class="btn btn-outline-light position-relative ms-3">
                            🛒
                            <span id="cart-count"
                                class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                                0
                            </span>
                        </button>
                    </div>
        
                </div>
            </div>
        </nav>

        <div class="container mt-3">
            <div class="row" id="product-container">
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
        <script src="./script.js"></script>

    </body>

</html>
