<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>EState | Real Estate Platform</title>
        <link rel="stylesheet" href="./style.css">
    </head> 

    <body>

        <header id="header">
            <div class="logo">EState</div>

            <nav id="nav">
                <ul>
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Properties</a></li>
                    <li><a href="#">Agents</a></li>
                    <li><a href="#">Contact</a></li>
                    <li><a href="#" class="btn">Login</a></li>
                </ul>
            </nav>

            <div class="menu-toggle" id="menu-toggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </header>

        <main>

            <section class="hero">
                <div class="hero-content">
                    <h1>Find Your Dream Home</h1>
                    <p>Buy, rent, or book properties easily with trusted agents</p>

                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="Enter location...">
                        <select>
                            <option>Property Type</option>
                            <option>Apartment</option>
                            <option>Villa</option>
                            <option>Office</option>
                        </select>
                        <button onclick="filterProperties()">Search</button>
                    </div>
                </div>
            </section>

            <section class="properties">
                <h2>Featured Properties</h2>

                <div class="property-grid" id="property-grid">
                </div>
            </section>

        </main>

        <script src="./script.js"></script>
    </body>

</html>
